<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word-Compatible Editor</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="brand"><span class="brand-badge" title="Word-Compatible Editor">W</span></div>
      <div class="docbar">
        <input id="doc-title" type="text" placeholder="Untitled" />
        <div class="dropdown" id="file-menu-wrap">
          <button id="btn-file" title="File menu">File ▾</button>
          <div class="dropdown-menu menu-vertical hidden" id="file-menu">
            <button id="btn-new" title="New document">New</button>
            <button id="btn-open" title="Open .docx / .txt / .html / .pdf file">Open…</button>
            <div class="dropdown submenu" id="export-menu-wrap">
              <button id="btn-export" title="Download / export">Export ▸</button>
              <div class="dropdown-menu menu-vertical hidden" id="export-menu">
                <button data-fmt="docx" title="Export as Word .docx (Office Open XML)">Word (.docx)</button>
                <button data-fmt="pdf" title="Print to PDF via the browser print dialog">PDF (print)</button>
                <button data-fmt="html" title="Save as a self-contained .html web page">Web page (.html)</button>
                <button data-fmt="txt" title="Export plain text content">Plain text (.txt)</button>
              </div>
            </div>
            <button id="btn-list" title="Saved documents">Library…</button>
            <button id="btn-print" title="Print / PDF">Print…</button>
            <div class="menu-sep"></div>
            <button id="btn-close" title="Close the current document or PDF and start fresh">Close file</button>
          </div>
        </div>
        <div class="dropdown" id="insert-menu-wrap">
          <button id="btn-insert" title="Insert menu">Insert ▾</button>
          <div class="dropdown-menu menu-vertical hidden" id="insert-menu">
            <button data-ins="pagebreak" title="Insert a page break at the cursor">Page break</button>
            <button data-ins="blankpage" title="Insert a blank page">Blank page</button>
            <div class="menu-sep"></div>
            <button data-ins="picture" title="Insert an image from your computer">Picture…</button>
            <button data-ins="table" title="Insert a table with chosen rows / columns">Table…</button>
            <button data-ins="link" title="Insert or edit a hyperlink">Link…</button>
            <button data-ins="hr" title="Insert a horizontal rule">Horizontal line</button>
            <button data-ins="symbol" title="Insert a special character (© · π → …)">Symbol…</button>
            <div class="menu-sep"></div>
            <button data-ins="wordart" title="Insert stylized WordArt text">WordArt…</button>
            <button data-ins="shape" title="Insert a shape (rectangle, arrow, star, …)">Shape…</button>
            <div class="menu-sep"></div>
            <button data-ins="header" title="Edit the document header">Header</button>
            <button data-ins="footer" title="Edit the document footer">Footer</button>
            <button data-ins="pagenum" title="Insert page numbers (top / bottom, left / center / right)">Page number…</button>
          </div>
        </div>
        <button id="btn-comments" title="Comments panel">Comments</button>
        <button id="btn-review" title="Track changes / review panel">Review</button>
        <button id="btn-history" title="Version history">History</button>
        <span id="save-status" class="status idle">ready</span>
        <span id="presence" class="presence"></span>
      </div>
    </header>

    <div id="toolbar"></div>
    <div id="pdf-toolbar" class="hidden"></div>
    <div id="find-host"></div>
    <div id="banner" class="banner hidden"></div>

    <main id="editor-wrap">
      <div id="library" class="panel hidden">
        <h3>Saved documents</h3>
        <ul id="library-items"></ul>
      </div>
      <div id="history" class="panel hidden">
        <h3>Version history</h3>
        <ul id="history-items"></ul>
      </div>
      <div id="page-outer">
        <div id="page">
          <div id="editor" contenteditable="true" spellcheck="true"></div>
        </div>
      </div>
      <div id="pdf-view" class="hidden"></div>
      <div id="comments-panel" class="panel panel-right hidden">
        <h3>Comments</h3>
        <ul id="comments-items"></ul>
      </div>
      <div id="review-panel" class="panel panel-right hidden">
        <h3>Review — track changes</h3>
        <label class="review-toggle"><input type="checkbox" id="track-toggle" /> Track changes (Ctrl+Shift+E)</label>
        <div class="review-actions">
          <button id="btn-accept-all">Accept all</button>
          <button id="btn-reject-all">Reject all</button>
        </div>
        <ul id="review-items"></ul>
      </div>
    </main>

    <footer id="statusbar">
      <span id="wc">0 words</span>
      <span id="pagecount">1 page</span>
      <span id="doc-info"></span>
      <span class="grow"></span>
      <label class="zoom-label">Zoom
        <select id="zoom">
          <option value="0.75">75%</option>
          <option value="1" selected>100%</option>
          <option value="1.25">125%</option>
          <option value="1.5">150%</option>
        </select>
      </label>
      <label class="zoom-label"><input type="checkbox" id="spellcheck-toggle" checked /> Spellcheck</label>
    </footer>

    <input id="file-input" type="file" accept=".docx,.txt,.htm,.html,.pdf" class="hidden" />
  </div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
